{% extends "base.html" %}
{% block content %}
<style>
    .login-container {
        max-width: 450px;
        margin: 3rem auto;
    }

    .login-card {
        border: none;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .login-header {
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        color: white;
        padding: 2rem;
        text-align: center;
    }

    .login-header i {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .login-header h3 {
        margin: 0;
        font-weight: 700;
    }

    .login-body {
        padding: 2rem;
    }

    .form-label {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 0.5rem;
    }

    .form-control {
        border-radius: 0.5rem;
        border: 2px solid #e2e8f0;
        padding: 0.75rem;
        transition: all 0.3s;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .input-group-icon {
        position: relative;
    }

    .input-group-icon i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
    }

    .input-group-icon .form-control {
        padding-left: 2.75rem;
    }

    .btn-login {
        width: 100%;
        padding: 0.75rem;
        font-weight: 600;
        border-radius: 0.5rem;
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        border: none;
        transition: all 0.3s;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
    }

    .divider {
        text-align: center;
        margin: 1.5rem 0;
        color: #64748b;
    }

    .btn-register {
        width: 100%;
        padding: 0.75rem;
        font-weight: 600;
        border-radius: 0.5rem;
        border: 2px solid #e2e8f0;
        background: white;
        color: #2563eb;
        transition: all 0.3s;
    }

    .btn-register:hover {
        border-color: #2563eb;
        background: #eff6ff;
        color: #1e40af;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-circle"></i>
            <h3>Iniciar Sesión</h3>
            <p class="mb-0 mt-2 opacity-75">Accede a tu cuenta</p>
        </div>

        <div class="login-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-envelope text-primary me-1"></i> Usuario o Correo
                    </label>
                    <div class="input-group-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="fas fa-lock text-primary me-1"></i> Contraseña
                    </label>
                    <div class="input-group-icon">
                        <i class="fas fa-key"></i>
                        <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>

                <button class="btn btn-primary btn-login" type="submit">
                    <i class="fas fa-sign-in-alt me-2"></i> Entrar
                </button>

                <div class="divider">
                    <span>o</span>
                </div>

                <a href="{% url 'ventas:register_view' %}" class="btn btn-register">
                    <i class="fas fa-user-plus me-2"></i> Crear una cuenta
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
