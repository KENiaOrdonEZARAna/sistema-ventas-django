{% extends "base.html" %}
{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
    }

    .form-card {
        background: white;
        border-radius: 1rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        padding: 2rem;
    }

    .form-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #e2e8f0;
    }

    .form-header i {
        font-size: 2rem;
        color: #2563eb;
    }

    .form-header h3 {
        margin: 0;
        color: #1e293b;
        font-weight: 700;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 0.5rem;
        display: block;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        border-radius: 0.5rem;
        border: 2px solid #e2e8f0;
        padding: 0.75rem;
        transition: all 0.3s;
        width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        outline: none;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }

    .btn-save {
        flex: 1;
        padding: 0.875rem;
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        border: none;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s;
    }

    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
    }

    .btn-cancel {
        flex: 1;
        padding: 0.875rem;
        background: #64748b;
        border: none;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s;
    }

    .btn-cancel:hover {
        background: #475569;
        transform: translateY(-2px);
    }
</style>

<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <i class="fas fa-edit"></i>
            <h3>Editar Categoría</h3>
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="form-actions">
                <button class="btn btn-success btn-save" type="submit">
                    <i class="fas fa-check me-2"></i> Guardar Cambios
                </button>
                <a class="btn btn-secondary btn-cancel" href="{% url 'ventas:listar_categorias' %}">
                    <i class="fas fa-times me-2"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
