{% extends "base.html" %}
{% block content %}
<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .page-title {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 0;
        color: #1e293b;
        font-weight: 700;
    }

    .page-title i {
        color: #10b981;
        font-size: 2rem;
    }

    .btn-crear {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border: none;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        border-radius: 0.5rem;
        transition: all 0.3s;
    }

    .btn-crear:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
    }

    .table-container {
        background: white;
        border-radius: 1rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .table {
        margin: 0;
    }

    .table thead {
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    }

    .table thead th {
        font-weight: 700;
        color: #1e293b;
        border: none;
        padding: 1rem;
    }

    .table tbody td {
        padding: 1rem;
        vertical-align: middle;
    }

    .table-striped tbody tr:hover {
        background-color: #f8fafc;
    }

    .btn-action {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        border-radius: 0.375rem;
        font-weight: 600;
        transition: all 0.3s;
    }

    .btn-action:hover {
        transform: translateY(-2px);
    }

    .empty-state {
        text-align: center;
        padding: 3rem;
        color: #64748b;
    }

    .empty-state i {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.5;
    }

    .badge-id {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 1rem;
        font-weight: 700;
        font-size: 0.875rem;
    }
</style>

<div class="page-header">
    <h2 class="page-title">
        <i class="fas fa-tags"></i> Categorías
    </h2>
    <a class="btn btn-success btn-crear" href="{% url 'ventas:crear_categoria' %}">
        <i class="fas fa-plus-circle me-2"></i> Nueva Categoría
    </a>
</div>

<div class="table-container">
    <table class="table table-striped mb-0">
        <thead>
        <tr>
            <th width="10%">ID</th>
            <th width="60%">Nombre</th>
            <th width="30%">Acciones</th>
        </tr>
        </thead>
        <tbody>
        {% for c in categorias %}
            <tr>
                <td><span class="badge-id">#{{ c.id }}</span></td>
                <td>{{ c.nombre }}</td>
                <td>
                    <a class="btn btn-primary btn-sm btn-action" href="{% url 'ventas:editar_categoria' c.pk %}">
                        <i class="fas fa-edit"></i> Editar
                    </a>
                    <a class="btn btn-danger btn-sm btn-action" href="{% url 'ventas:eliminar_categoria' c.pk %}">
                        <i class="fas fa-trash"></i> Eliminar
                    </a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="3">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p class="mb-0">No hay categorías registradas</p>
                    </div>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
